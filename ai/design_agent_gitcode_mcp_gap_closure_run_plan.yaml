apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-gap-closure-design-agent-run-plan
  title: GitCode MCP gap-closure design run
spec:
  workflow: triborg-design-agent-ywd
  workflow_id_prefix: gitcode-mcp-gap-closure-design-agent
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_gap_closure_iteration_2
      input:
        task_markdown: |
          Design the second implementation iteration for `gitcode-mcp`, focused on closing dogfood gaps found after the first cache-first implementation attempt and after installing the MCP server locally.

          Context:
          - Repository path is provided by `design_agent.project.workspace_root`.
          - The repository is standalone and public-safe. Do not mention private source repositories, private tracker/wiki names, personal machine paths, raw credentials, bearer tokens, cookies, or unsanitized API responses in durable output.
          - `main` now includes the first design/implementation merge, including cache/service/index/MCP/CLI code and the original architecture plan under `ai/`; treat this run as a gap-closure design against current implemented/runtime behavior, not a blank-slate architecture exercise.
          - The local dogfood goal is to connect `gitcode-mcp` to a test GitCode repository, populate the local cache, run the read path through CLI and MCP, and later use this as the migration substrate for selected history/docs.
          - The project goal remains cache-first GitCode tracker/wiki work over unreliable network. Routine reads must work offline after cache population. Live network operations must be explicit.

          Resolved prior clarifications from the first design-agent research session:
          - Support both GitCode tracker issues and GitCode wiki pages from the start. The knowledge-layer replacement needs page-like documents for decisions, handoffs, hierarchy, and directory-like wiki organization.
          - Treat GitCode tracker/wiki as the source of truth. Local files are cache projections of GitCode state, not the primary source of truth. Local markdown/file ingest may exist only as a bridge/import/export/cache-projection path.
          - Use SQLite through `modernc.org/sqlite` for the persistent cache store. Keep the build pure-Go/no-CGo while preserving relational queries and FTS5.
          - Support both stdio and HTTP/SSE MCP transports. HTTP/SSE is a base scenario, including cases where the MCP server and agents are on different hosts.
          - Include write operations in the second iteration scope: issue create/update, issue body update, issue comments, wiki page create/update, and idempotent sync back to GitCode where feasible.
          - Target the current fresh stable Go toolchain at implementation time rather than an older compatibility floor, unless dependency evidence forces a lower floor.
          - Use heading-delimited markdown chunks as the primary segmentation strategy, with configurable max-chunk-size fallback that splits oversized sections at paragraph/line boundaries.
          - Keep fixed-size sliding-window chunking available as a policy for changelogs and other long/non-heading-friendly documents. Design chunking as an extensible policy surface because retrieval experiments are expected.

          Observed gaps from coordinator review:
          1. Installed MCP currently works as a protocol skeleton and fixture demo, but the active cache only exposes a tiny fixture corpus such as `DOC-123` and `TASK-001`; real coordinator queries return `cache_empty`.
          2. MCP exposes only the original eight read tools: `search_sources`, `get_source`, `list_sources`, `source_backlinks`, `resolve_id`, `sync_status`, `export_snapshot`, and `diff_snapshot`.
          3. Service/CLI code may already contain richer operations such as `get_snippet`, `recent`, `link-check`, `stale-index`, `index`, and sync/write seams, but these are not all available through MCP.
          4. The agent read path is incomplete: install -> config -> secret -> sync/ingest -> index -> search/get/snippet/backlinks/sync-status -> MCP should be one documented, testable path.
          5. Runtime startup must wire GitCode API client/config/token into explicit sync paths; read-only MCP may use cache only, but sync/bootstrap cannot silently construct a service without a GitCode client when sync is expected.
          6. Secret/config setup is too hard. A local macOS dogfood wrapper currently reads the token from Keychain with `security find-generic-password`, exports `GITCODE_TOKEN`, sets `GITCODE_CONFIG`, and execs `gitcode-mcp --mcp`. This pattern should be documented and generalized without committing private paths or secrets.
          7. Config discoverability is poor. A user should not need to read Go source or ask an agent to learn which config file is active, which config file they should edit, which environment variables override it, and how cache/token paths are resolved.
          8. Cross-platform secret handling needs a product decision: macOS Keychain, Linux Secret Service or `pass`, Windows Credential Manager, CI/headless env vars, and whether first-slice product commands such as `auth login`, `auth status`, `auth logout`, `config init`, `config locate`, `config show --redacted`, and `doctor` are needed.
          9. The read path must be treated as a first-class product contract, not a side effect of tests. The user should be able to connect a test GitCode repo and verify real cached reads.
          10. MCP kind filters and cached record kinds can drift; for example a cache record kind like `doc` must be either accepted by MCP filters or normalized to a documented kind such as `page` or `wiki`.
          11. RAG-ready corpus work is still useful, but first close exact read path gaps: deterministic chunks, snippets, citations, and corpus export must be populated and exposed before embeddings.
          12. `export_snapshot` should expose whether chunks are absent because indexing has not run, not silently produce a corpus with no citable ranges.
          13. `diff_snapshot` must be honest about snapshot references. Arbitrary `base_id` and `head_id` should not compare current/current and return `changed:false` unless those ids actually resolve to stored snapshots.
          14. Write paths were previously ambiguous or stub-like. The clarified target requires real write operation design for GitCode issues and wiki pages, with clear safety/idempotency/audit semantics and no fake-success remote writes.
          15. README/backlog/docs can drift behind implementation state. The second iteration should make docs reflect the actual product surface and install flow.
          16. GitCode API discovery remains a risk. The design must identify which parts can be fixture-backed now and which require live API probing against a test repository.
          17. The first iteration appears to have narrowed the MCP runtime to stdio only. The second iteration must restore/add a shared HTTP SSE transport mode so one long-lived `gitcode-mcp` server can own one cache database while multiple MCP clients or agents such as Codex, Zed, editor integrations, and workflow components query it concurrently.
          18. Repository scope is not yet first-class. Current sync/read concepts can imply loose `owner`, `repo`, `issue:42`, or `wiki:Home` references, but real debugging, identity resolution, indexing, wiki hierarchy, and conflict handling must be tied to a concrete configured GitCode repository. Remote aliases such as `issue:42` and `wiki:Home` are unsafe without repository scope because issue numbers and wiki slugs collide across repositories.

          Goals for this design run:
          1. Produce a gap-closure architecture and task package for the second iteration, suitable for a follow-up design-implementator run.
          2. Define the minimum useful dogfood slice: a developer installs the binary, stores/configures a token, connects a test GitCode repo, syncs one issue and one wiki page as source-of-truth records, indexes the cache projection, runs CLI reads, then attaches MCP and performs the same reads through tools.
          3. Define a repository-binding model as a first-class product object: stable local `repo_id`, API base URL, owner, repo name, enabled scopes such as issues/wiki, optional default branch/project metadata if GitCode requires it, and explicit public-safe display names. All sync, index, read filters, identity aliases, snapshots, diagnostics, and write operations must be traceable to this configured repository scope.
          4. Define the operations/security design for installation, config, active-config discovery, token storage, Keychain wrapper docs, cross-platform credential storage, startup diagnostics, and `doctor`/`auth`/`config` command decisions.
          5. Define MCP transport architecture for both stdio and shared HTTP SSE server mode. The design must cover bind address, endpoint shape, client configuration, health/readiness, authentication or localhost-only defaults, remote-host deployment, graceful shutdown, request correlation, and current MCP transport compatibility research.
          6. Define multi-client concurrency semantics: one cache database, many readers, explicit serialized sync/index/write operations, cache locks, SQLite/WAL or equivalent storage settings, busy timeout behavior, and clear errors when another process owns migration/indexing.
          7. Define MCP query parity needed to replace coordinator shell usage: `get_snippet`, `recent_changes`, `link_check`, `stale_index_report`, `cache_stats` or `cache_status`, `search_chunks` or `list_chunks`, and clear repo-aware `sync_status`.
          8. Define cache bootstrap semantics: explicit sync from configured GitCode repository scope, issue/wiki/search/repo sync modes, explicit local markdown/export ingest, idempotency, cache lock, and index trigger.
          9. Define write-path semantics for GitCode issue create/update/body/comment operations and wiki page create/update operations, including dry-run, idempotency keys or source fingerprints, conflict handling, audit trail, repository scope, and public-safe fixture/live-test validation.
          10. Define read-path validation with a sanitized fixture path and an optional credential-gated live test path against a configured test GitCode repo.
          11. Define snapshot/corpus integrity: chunk population, citation fidelity, repo-scoped remote aliases, export warnings, snapshot id storage/resolution, and truthful diff behavior.
          12. Define chunking policy semantics: heading-delimited markdown default, configurable max-section splitting, sliding-window option for changelogs/non-heading documents, and an extension point for later retrieval experiments.
          13. Define documentation deliverables: install quickstart, config reference, repository-binding reference, secrets reference, stdio and HTTP SSE MCP client setup, read/write path walkthrough, troubleshooting/doctor guide, and public-safe fixture capture notes.
          14. Keep RAG as later optional retrieval. The second iteration should be RAG-ready through chunks/citations/exports, but should not add embeddings/vector DB/reranking.
          15. Keep GitHub/GitLab CLI and MCP ecosystem references as ergonomics evidence only. The product target is GitCode unless the operator explicitly expands scope.

          Required output shape:
          - Executive gap-closure summary.
          - Current-state vs target-state table.
          - Read-path sequence diagram from install/config/token to CLI/MCP cached query.
          - Operations/security design for installation, config, active-config discovery, Keychain/credential-store wrappers, and diagnostics.
          - Config discovery UX: how a user finds the active config, initializes a default config, sees redacted effective configuration, and diagnoses env-var/default-path precedence.
          - MCP transport design: stdio single-client mode plus shared HTTP SSE server mode, including compatibility notes against current MCP transport naming/specs.
          - Multi-client concurrency design: one server, one cache database, many agent/editor clients, serialized writers, concurrent reads, locking, migrations, and cache/index ownership.
          - CLI contract additions and changes.
          - MCP tool contract additions and changes.
          - Repository-binding model: configured repo ids, owner/repo/base-url scope, enabled source scopes, repo-scoped remote aliases, repo-aware CLI/MCP filters, and repo-bound diagnostics.
          - GitCode source-of-truth model: tracker issues and wiki pages as canonical records, with local files/cache as projections.
          - Cache bootstrap/sync/index state machine.
          - Write-path design for issue/wiki create/update/comment operations.
          - Snapshot/chunk/citation integrity design.
          - Chunking policy design and extension points.
          - GitCode API discovery and live-test plan.
          - Documentation plan.
          - Public-safety and secret-redaction requirements.
          - One-week implementation plan with tasks ordered for dogfood value.
          - Acceptance criteria for each task.
          - Explicit non-goals and deferred work.
          - Separate section: Dogfood observations that should feed back into Triborg/Runa/design-agent configuration.
          - Component discovery rationale: let design-agent propose the minimal component catalog itself; do not assume the coverage checklist below is already the component boundary.

          Coverage checklist for design-agent component discovery:
          - Runtime gap audit across current scaffold, docs, implemented runtime behavior, and installed MCP surface.
          - Installation, active-config discovery, secrets, credential stores, wrappers, doctor/auth/config commands, and public-safe docs.
          - Shared HTTP SSE MCP server transport for multiple clients, while keeping stdio as a local compatibility mode.
          - Remote-host HTTP/SSE deployment shape for cases where the MCP server and agents are not colocated.
          - Database concurrency and lock ownership for one cache database shared by Codex, Zed, editor integrations, workflow components, and other agents.
          - Repository binding and repo-scoped identity model: configured `repo_id`, API base URL, owner/repo, enabled issue/wiki scopes, repo-aware source records, repo-scoped aliases, and collision handling across multiple repositories.
          - GitCode tracker/wiki source-of-truth model with local markdown/cache projections.
          - Cache bootstrap and exact read path from GitCode/test fixtures through indexing to offline CLI/MCP reads.
          - Repo-bound debugging and diagnostics: `repo status`/`doctor --repo` behavior, API reachability, auth visibility, repo visibility, issue/wiki endpoint checks, cache/index state, last sync events, and actionable failure classes.
          - Real GitCode write operations for issues, comments, and wiki pages, including safety and idempotency.
          - MCP query parity for coordinator replacement usage: snippets, recent changes, link checks, stale-index reports, cache status, chunks, backlinks, and sync status.
          - Sync adapter startup wiring for config/token/GitCode client in explicit sync paths while keeping routine reads cache-only.
          - Snapshot, diff, chunk, citation, corpus export, and deterministic validation integrity.
          - Extensible chunking policies: heading-delimited default, max-size fallback, and sliding-window option.
          - Sanitized fixtures and optional credential-gated live validation against a test GitCode repository.
          - Migration readiness for selected history/docs without losing stable ids, backlinks, and citations.
        require_clarification_stages: []
        design_agent:
          project:
            workspace_root: "@repo"
            runs_dir: "@artifacts"
            competitor_repo_cache_root: "@ai/research-repos"
            target_vm_repo: "@repo"
            target_vm_name: GitCode MCP gap-closure iteration
            managed_language_name: Go
            language_spec_files:
              - "@repo/README.md"
              - "@repo/AGENTS.md"
              - "@repo/project/tasks/backlog.md"
              - "@repo/docs/architecture.md"
              - "@repo/docs/cache-and-sync-model.md"
              - "@repo/docs/gitcode-api-discovery.md"
              - "@repo/docs/operations/mcp-installation-and-secrets.md"
              - "@repo/ai/design_agent_gitcode_mcp_architecture_run_plan.yaml"
          competitors:
            - id: mcp
              name: Model Context Protocol
              source_url: https://github.com/modelcontextprotocol/modelcontextprotocol
              language: Protocol/tooling
              runtime: Agent-facing tool/resource/prompt protocol and JSON-RPC conventions.
            - id: gh-cli
              name: GitHub CLI
              source_url: https://github.com/cli/cli
              language: Go
              runtime: Reference for Go CLI auth, config, command ergonomics, and hosted-repo workflows.
            - id: git-credential-manager
              name: Git Credential Manager
              source_url: https://github.com/git-ecosystem/git-credential-manager
              language: C#
              runtime: Reference for cross-platform credential-store UX and diagnostics.
            - id: go-keyring
              name: go-keyring
              source_url: https://github.com/zalando/go-keyring
              language: Go
              runtime: Reference for Go access to OS credential stores.
            - id: keyring
              name: 99designs keyring
              source_url: https://github.com/99designs/keyring
              language: Go
              runtime: Reference for cross-platform secret storage abstraction tradeoffs.
          components: []
          search:
            provider: exa
            max_queries: 24
            max_results: 60
            max_sources: 120
            gap_fill_enabled: false
            fallback_queries:
              - query: GitCode API /api/v5 authentication issues wiki docs.gitcode.com token
                intent: Find primary GitCode API/auth evidence for sync and setup.
                priority: high
              - query: GitCode API repository owner repo project namespace /api/v5 repos issues wiki docs.gitcode.com
                intent: Verify how GitCode identifies repositories and which owner/repo/project fields must be preserved in repo bindings.
                priority: high
              - query: Gitee GitCode API repository issues wiki owner repo slug number authentication pagination
                intent: Cross-check repo-scoped issue numbers and wiki slugs so remote aliases are not modeled globally.
                priority: high
              - query: GitCode API issues comments attachments wiki pagination rate limit docs.gitcode.com
                intent: Find endpoint and failure-mode evidence for live test repo sync.
                priority: high
              - query: GitCode API create update issue comment wiki page update docs.gitcode.com api v5
                intent: Find primary GitCode evidence for required issue/comment/wiki write operations.
                priority: high
              - query: Model Context Protocol server installation environment variables secrets stdio configuration
                intent: Find MCP setup conventions and docs patterns.
                priority: medium
              - query: Model Context Protocol HTTP SSE transport server multiple clients streamable HTTP specification
                intent: Verify current MCP HTTP/SSE transport terminology and compatibility requirements for shared server mode.
                priority: high
              - query: Go MCP server SSE streamable HTTP transport implementation example
                intent: Find Go implementation patterns for shared HTTP MCP servers.
                priority: high
              - query: GitHub CLI auth login token keyring source code Go config
                intent: Find reference UX for auth/config/status/doctor commands in a Go CLI.
                priority: high
              - query: macOS Keychain security find-generic-password command line generic password
                intent: Verify macOS Keychain wrapper docs and safe examples.
                priority: medium
              - query: Go cross platform keyring library macOS Keychain Linux Secret Service Windows Credential Manager
                intent: Compare whether to implement native credential storage or only document wrappers.
                priority: high
              - query: modernc.org/sqlite Go FTS5 pure Go SQLite cache database
                intent: Validate the pure-Go SQLite/FTS5 cache-store choice and implementation constraints.
                priority: high
              - query: Go current stable release module go directive toolchain version
                intent: Verify the current stable Go toolchain before pinning the module version floor.
                priority: medium
              - query: Git Credential Manager credential store macOS Keychain Windows Credential Manager Linux Secret Service docs
                intent: Use mature credential UX as reference for cross-platform secret handling.
                priority: medium
              - query: MCP server cache-first search get snippet backlinks local database CLI architecture
                intent: Find adjacent MCP/local-cache design patterns.
                priority: medium
              - query: SQLite WAL concurrent readers single writer Go busy timeout migrations local cache server
                intent: Find implementation patterns for one local database shared through a long-running Go server.
                priority: high
              - query: snapshot diff deterministic JSON corpus chunk citation line ranges local document cache
                intent: Find evidence for truthful snapshot/corpus diff and citation-ready exports.
                priority: medium
              - query: markdown heading based chunking max chunk size sliding window retrieval changelog
                intent: Find chunking policy references for heading-delimited defaults and sliding-window fallback.
                priority: medium
          runtime:
            max_parallel_research: 3
            max_parallel_component_design: 4
            allow_network_for_research: true
            enable_clarifications: true
            persist_intermediate_artifacts: true
          output:
            write_design_package: true
            design_package_path: "@artifacts/gitcode_mcp_gap_closure_design_package.zip"
            report_path: "@artifacts/gitcode_mcp_gap_closure_report.md"
            public_safe: true
