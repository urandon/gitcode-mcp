apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-live-operations-iteration-6-design-implementator-run-plan
  title: GitCode MCP live operations iteration 6 design implementation run
spec:
  workflow: triborg-design-implementator-v2-ywd
  workflow_id_prefix: gitcode-mcp-live-operations-design-implementator
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_live_operations_iteration_6_implementation
      input:
        design_package_zip_path: "@ai/design-package-iteration-6.zip"
        target_repo_path: "@repo"
        target_branch: feat/live-api-coverage-iteration-6
        max_task_iterations: 45
        live_validation_enabled: false
        device_validation_enabled: false
        runner_runtime: worker
        implementation_constraints: |
          - Treat `ai/design-package-iteration-6.zip` as the primary design package for this run.
          - Use `project/tasks/TASK-0007-live-operations-iteration-6.md` as the repo-local scope contract. It overrides conflicting generated component wording.
          - This is iteration 6 over the current mainline implementation. Preserve iteration 5 behavior and tests unless a stricter replacement is added and documented.
          - Keep historical run inputs untouched. Do not edit `ai/design_implementator_gitcode_mcp_live_api_iteration_5_run_plan.yaml`, prior `ai/design-package-iteration-*.zip` files, or historical docs/design-package archives.
          - Keep this repository public-safe: do not commit private repository coordinates, personal filesystem paths, raw credentials, cookies, bearer tokens, Authorization headers, browser session material, unsanitized API responses, or private tracker/wiki names.
          - Default validation must be offline and deterministic. `go test ./...` must not require real GitCode network access, real credentials, SSH agent access, browser cookies, or OS Keychain access.
          - Use mocked `httptest.Server` and sanitized fixtures for live API shape coverage. Real GitCode smoke is optional, credential-gated, and must be redacted if documented.
          - Preserve cache-first reads and the existing MCP read tool surface. Add lifecycle/control-plane MCP tools without advertising real MCP write tools.
          - MCP write tool names may be recognized, but they must return structured `unsupported_capability` without credential lookup, outbound HTTP, or cache mutation.
          - Refactor MCP tool registration away from positional `toolDefs[N]` coupling. Tool handlers must bind by name so adding lifecycle tools cannot shift existing handlers.
          - `index_repo` must call `Service.Index(ctx, service.OperationRequest{...})`. Do not implement index refresh through `Service.StaleIndex`; stale-index remains a diagnostic/readiness report.
          - MCP startup must have a minimal fallback construction path. If cache open, schema compatibility, lock acquisition, or service construction fails, `tools/list` must still expose at least `doctor` with a structured startup diagnostic.
          - Cache schema compatibility must use the current binary-supported schema version from code (`currentSchemaVersion`, currently 11), not stale generated references to schema version 7.
          - Keep credential resolution scoped to the existing `internal/config` credential chain unless a very small compatibility wrapper is needed. Do not create a broad new `internal/auth` subsystem just to rename existing behavior.
          - Do not add unsupported Basic Auth behavior (`GITCODE_USER`/`GITCODE_PASS`) unless there is sanitized evidence and tests proving GitCode accepts it. Token/keychain parity is the required fix.
          - All live write gates must consume the same resolved credential result as `auth status`. No service/write path may bypass the resolver by reading only `os.Getenv("GITCODE_TOKEN")`.
          - GitCode HTTP adapter code owns HTTP routes, request/response models, pagination, and typed provider errors. It must not directly construct cache `SourceRecord`/`SourceGraph` records; service remains responsible for cache projection.
          - Large collection sync must be bounded and cancellable for every collection in scope. Issues/PR/comments can use page loops; wiki must bound traversal inside the wiki walker itself, not by wrapping a recursive `ListWikiPages` call in an outer page loop.
          - Cancellation semantics must be precise in tests: define whether cancellation happens before fetching a page, after fetch before commit, or after commit. `SuccessCount` must match committed records.
          - Empty wiki behavior must be explicit: either supported bootstrap through the proven v5 wiki-as-repository route with confirmation, or a typed non-retryable `empty_wiki` / `unsupported_wiki_uninitialized` diagnostic with actionable remediation.
          - Wiki product runtime must use token-compatible `/api/v5/repos/{owner}/{repo}.wiki/...` routes. Browser `web-api.gitcode.com/api/v2/projects/wiki/*` routes remain research evidence only and must not be wired into runtime.
          - Wiki path normalization belongs where cache paths are constructed. Remote `Home.md` must cache as `wiki/Home.md`, never `wiki/Home.md.md`, in both sync and write-confirmation projections.
          - Wiki create/update confirmation must tolerate successful 201/200 responses that omit `path`/`sha` by performing read-back confirmation. Unconfirmed writes must return `write_confirmation_incomplete` and must not be marked as confirmed cache success.
          - Issue create/update must omit the `labels` key when no label mutation was requested. Preserve current label normalization/payload shape unless tests prove a safer replacement; prefer nil `*json.RawMessage` or an explicit labels-provided flag over losing existing normalization.
          - `add-comment` and PR comment writes must decode live `{id, note_id, body, ...}` shapes. Prefer `note_id` as the remote comment identity when present, with fallback to `id`.
          - Provider-contacted decode failures must classify as `schema_decode` with `http_attempted: true`.
          - PR support in this iteration is list/detail/comments plus PR comment write if covered by mocked routes. Do not implement deployment-inhibited routes (`pull_requests`, `merge_requests`, `review_comments`).
          - Cache lock contention must surface as a typed retryable diagnostic (`cache_busy` or equivalent), not `internal_error`; concurrent reads should remain stable under WAL.
          - Do not satisfy acceptance by weakening or deleting earlier tests, narrowing MCP read schemas, moving tests out of Go package paths, or making live network access mandatory.
        validation_constraints: |
          - `go test ./...` is the final executable acceptance gate.
          - `git diff --check` must pass.
          - New MCP tests must prove lifecycle tools are advertised, write tools are not advertised as supported, blocked write calls have no credential/network/cache side effects, and `tools/list` still returns `doctor` in startup-failure modes.
          - New MCP tests must prove `index_repo` invokes `Service.Index`, not `Service.StaleIndex`.
          - New bounded-sync tests must prove page limits, timeout/cancellation, progress reporting, and partial committed counts with mocked provider data.
          - New wiki tests must prove empty-wiki classification/bootstrap behavior, `.md` path normalization, base64 write payloads where required, sha/read-back confirmation, and `write_confirmation_incomplete` on failed confirmation.
          - New credential tests must prove keychain-equivalent/env resolver parity across `auth status` and live write admission without touching the real OS Keychain.
          - New issue/comment tests must prove label omission, live comment `note_id` decoding, malformed response `schema_decode`, and `http_attempted: true`.
          - New PR tests must prove `/api/v5/repos/{owner}/{repo}/pulls` list/detail/comments routes and PR comment write shape, while proving no deployment-inhibited routes are called.
          - New cache/concurrency tests must prove concurrent reads and writer contention diagnostics do not surface as generic `internal_error`.
          - The final repository state must not expose tokens, Authorization headers, cookies, raw API responses, private repo coordinates, or browser session material in tracked files, logs, fixtures, snapshots, docs, or handoffs.
        final_validation_command:
          script:
            text: |
              #!/usr/bin/env bash
              set -euo pipefail

              export GOCACHE="${GOCACHE:-$PWD/.cache/go-build}"
              mkdir -p "$GOCACHE"

              test -s go.mod
              test -s cmd/gitcode-mcp/main.go
              test -s ai/design-package-iteration-6.zip
              test -s ai/design_implementator_gitcode_mcp_live_operations_iteration_6_run_plan.yaml
              test -s project/tasks/TASK-0007-live-operations-iteration-6.md
              test -s project/handoffs/2026-06-24-live-api-iteration-5-smoke.md
              test -s project/research/gitcode-wiki-api-v5-repository-model-2026-06-23.md

              grep -q 'design_package_zip_path: "@ai/design-package-iteration-6.zip"' ai/design_implementator_gitcode_mcp_live_operations_iteration_6_run_plan.yaml
              grep -q 'target_branch: feat/live-api-coverage-iteration-6' ai/design_implementator_gitcode_mcp_live_operations_iteration_6_run_plan.yaml
              grep -q 'currentSchemaVersion = 11' internal/cache/schema.go
              grep -q 'type ChainCredentialProvider struct' internal/config/effective.go
              grep -q 'Authorization", "Bearer "' internal/gitcode/http_client.go

              go test ./...
              git diff --check

              go run ./cmd/gitcode-mcp --help >/tmp/gitcode-mcp-help.txt
              go run ./cmd/gitcode-mcp --version >/tmp/gitcode-mcp-version.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-help.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-version.txt

              for subcommand in \
                repo \
                sync \
                search \
                list \
                get \
                get-snippet \
                list-chunks \
                search-chunks \
                search_sources \
                cache-status \
                sync-status \
                stale-index \
                mcp \
                create-issue \
                update-issue \
                add-comment \
                create-page \
                update-page \
                add-label \
                doctor \
                auth \
                migrate-cache; do
                go run ./cmd/gitcode-mcp "$subcommand" --help >/tmp/gitcode-mcp-help-"$subcommand".txt
                grep -qiE 'usage|help|gitcode-mcp|'"$subcommand" /tmp/gitcode-mcp-help-"$subcommand".txt
              done

              if grep -RIn 'web-api.gitcode.com/api/v2/projects/wiki' cmd internal --exclude='*_test.go'; then
                echo "product runtime must not call browser wiki web-api routes" >&2
                exit 65
              fi

              if grep -RInE '(Authorization:|Bearer[[:space:]]+[A-Za-z0-9._-]{16,}|Cookie:|Set-Cookie:|sk-[A-Za-z0-9_-]{16,}|GITCODE_TOKEN[[:space:]]*=)' . \
                --exclude-dir=.git \
                --exclude-dir=.cache \
                --exclude-dir=ai \
                --exclude-dir=docs/triborg \
                --exclude='*.zip'; then
                echo "repository contains secret-like or unsanitized tracked material" >&2
                exit 66
              fi
            expected_exit_codes: [0]
            policy:
              validation_scope: final_offline_gates
