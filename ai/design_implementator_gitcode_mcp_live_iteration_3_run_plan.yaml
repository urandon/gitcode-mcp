apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-live-readiness-iteration-3-design-implementator-run-plan
  title: GitCode MCP live-readiness iteration 3 design implementation run
spec:
  workflow: triborg-design-implementator-v2-ywd
  workflow_id_prefix: gitcode-mcp-live-readiness-design-implementator
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_live_readiness_iteration_3_implementation
      input:
        design_package_zip_path: "@ai/design-package-iteration-3.zip"
        target_repo_path: "@repo"
        target_branch: feat/ai/gitcode-mcp-live-readiness-iteration-3
        max_task_iterations: 40
        live_validation_enabled: false
        device_validation_enabled: false
        runner_runtime: worker
        implementation_constraints: |
          - Treat `ai/design-package-iteration-3.zip` as the primary design package and implementation task source for this run.
          - This is an iteration over the current GitCode MCP codebase, not a blank-slate rewrite. Preserve cache-first reads, existing CLI/MCP behavior that already works, and previous iteration tests unless a contract is intentionally superseded and documented.
          - `docs/triborg/design-package-iteration-1` and `docs/triborg/design-package-iteration-2` are historical archives. Do not move, copy, delete, or rewrite them.
          - It is acceptable and expected for the implementator to publish the iteration 3 package to a fresh `docs/triborg/design-package` directory. Do not rename that fresh output to `design-package-iteration-3` during this implementation run.
          - Do not move, rename, rewrite, or unpack prior zip artifacts. `ai/design-package-iteration-1.zip`, `ai/design-package-iteration-2.zip`, and `ai/design-package-iteration-3.zip` stay where they are.
          - Keep tests under their normal Go package paths. Do not archive tests under `docs/`, do not move existing tests out of `go test ./...`, and do not delete previous-iteration contract tests just because the iteration 3 package adds more scenarios.
          - When a new test collides with an existing test or fixture name, add a new test file or use an iteration/scenario-specific test function name in the same package.
          - Keep this public repository safe: do not commit private repository coordinates, personal filesystem paths, raw credentials, cookies, bearer tokens, raw Authorization headers, internal URLs, unsanitized API responses, or source-system-specific private tracker/wiki names.
          - Use placeholders and environment variables for live validation coordinates: `GITCODE_E2E_REPO_ID`, `GITCODE_E2E_OWNER`, `GITCODE_E2E_REPO`, `GITCODE_E2E_API_BASE_URL`, and `GITCODE_TOKEN`.
          - Default validation must stay offline and deterministic. `go test ./...`, `./scripts/check.sh`, fixture tests, and docs smoke must not require network access, a real GitCode token, or a real OS keychain.
          - Credential-gated live e2e must be explicit and skipped unless opt-in environment variables are set. It must redact tokens, private repository coordinates, Authorization headers, cookies, and raw API payloads.
          - Preserve the current API baseline unless live evidence proves otherwise: default GitCode API base URL is `https://api.gitcode.com/api/v5`, and the current HTTP adapter uses `Authorization: Bearer <token>`. Do not switch durable docs or endpoint builders to `/api/v4` just because the design package text mentions it.
          - Preserve current public command names and add aliases only when useful. Existing write/read surfaces include `repo add`, `repo status`, `sync`, `create-issue`, `update-issue`, `add-comment`, `create-page`, `update-page`, `add-label`, `search`, `search_sources`, `list`, `get`, `list-chunks`, `search-chunks`, `cache-status`, `sync-status`, and MCP read tools. If the design package names a future command such as `bind`, `create-comment`, or `create-wiki-page`, implement it as a backward-compatible alias or document the mapping; do not break existing names.
          - Provider selection must fix the observed live blocker: explicit live sync/write paths must construct and use the real GitCode HTTP client instead of `sanitizedFixtureClient`; fixture/offline mode remains the default for normal tests and no-live commands.
          - Token handling must keep `GITCODE_TOKEN` as the required portable baseline. Native macOS Keychain support is optional for this iteration and must be behind a credential-provider seam with fake/offline tests. Do not add a hard keychain dependency that makes default builds or tests platform-dependent.
          - Cache schema work must match the current implementation, not invented package wording. The current cache uses a `schema_version` table and `currentSchemaVersion = 4`; do not replace it with `PRAGMA user_version` as the source of truth unless done as an additive diagnostic bridge.
          - Do not spend iteration 3 preserving historical pre-live development caches. Required behavior is early typed diagnostics for legacy/incompatible DBs, clean initialization of new DBs, clean open of supported current DBs, and a typed newer-than-supported failure. Lossless migration is required only for schemas the implementation can prove compatible.
          - Stale-index repair must distinguish source content hash from chunk content hash and must set enough index metadata so a fresh `sync --index` or `index --full` reports no stale entries unless source content actually changed.
          - `search_sources` must work against synced issue/wiki records or be redefined consistently across CLI and MCP. It must not return `cache_empty` after a successful sync/index when matching source records exist.
          - MCP tool schemas must include the real source kinds `issue` and `wiki` where kind filters are exposed. Preserve CLI/MCP parity and return typed argument errors for invalid filters.
          - CLI help/discovery must exit 0 for the root command and all registered subcommands. Fix the `--help` paths that currently surface invalid-query diagnostics.
          - `doctor`/readiness output should let an operator see binary version, config path, cache path, schema version, repo binding, token source, provider mode, auth probe status, last sync, index freshness, and MCP transport health without exposing secrets.
          - Leave a concise implementation handoff under `project/handoffs/` if live e2e cannot be fully executed in the default environment. The handoff must record which checks were run, which live checks were skipped, and the exact opt-in variables required.
        validation_constraints: |
          - Default validation must be offline, deterministic, and runnable without GitCode credentials, network access, or OS keychain access.
          - Live validation must be opt-in only. Use a build tag, environment gate, or explicit script flag such as `GITCODE_LIVE_TEST=1`, and skip cleanly when unset.
          - Live validation artifacts and transcripts must be redacted before they are written under tracked repository paths.
          - The implementation must not introduce tracked private repo coordinates, raw tokens, Authorization headers, cookies, or raw API responses.
          - The final repository state must not expose fixture-only behavior on explicit live paths: a `--live` sync/write with a token must not route to a read-only fixture provider.
          - The final repository state must not regress cache-first offline reads or existing MCP read tools.
          - Schema and migration work must be based on the current `internal/cache/schema.go` implementation and its `schema_version` table. The package's "version-2-to-version-3" wording is not authoritative for this codebase.
          - API route work must preserve the current `api/v5` baseline unless sanitized primary evidence proves a different GitCode route is required.
        final_validation_command:
          script:
            text: |
              #!/usr/bin/env bash
              set -euo pipefail

              export GOCACHE="${GOCACHE:-$PWD/.cache/go-build}"
              mkdir -p "$GOCACHE"

              test -s go.mod
              test -s cmd/gitcode-mcp/main.go
              test -s internal/cache/schema.go
              test -s internal/gitcode/http_client.go
              test -s ai/design-package-iteration-3.zip
              test -s ai/design_implementator_gitcode_mcp_live_iteration_3_run_plan.yaml
              test -s docs/triborg/design-package-iteration-1/architecture.md
              test -s docs/triborg/design-package-iteration-2/architecture.md
              test -s docs/triborg/design-package/architecture.md
              test -s docs/triborg/design-package/tasks.json
              test -s docs/triborg/design-package/outcome-contract.json

              grep -q 'design_package_zip_path: "@ai/design-package-iteration-3.zip"' ai/design_implementator_gitcode_mcp_live_iteration_3_run_plan.yaml
              grep -q 'currentSchemaVersion = 4' internal/cache/schema.go
              grep -q 'Authorization", "Bearer "' internal/gitcode/http_client.go
              grep -RIn 'api/v4' cmd internal docs README.md project \
                --exclude-dir=triborg \
                --exclude-dir=.git \
                --exclude-dir=.cache \
                --exclude='*.zip' && {
                  echo "durable source still references api/v4; preserve api/v5 unless sanitized evidence proves otherwise" >&2
                  exit 67
                } || true

              ./scripts/check.sh

              go run ./cmd/gitcode-mcp --help >/tmp/gitcode-mcp-help.txt
              go run ./cmd/gitcode-mcp --version >/tmp/gitcode-mcp-version.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-help.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-version.txt

              for subcommand in \
                repo \
                sync \
                search \
                list \
                get \
                get-snippet \
                list-chunks \
                search-chunks \
                search_sources \
                cache-status \
                sync-status \
                stale-index \
                mcp \
                create-issue \
                update-issue \
                add-comment \
                create-page \
                update-page \
                add-label \
                doctor \
                auth \
                migrate-cache; do
                go run ./cmd/gitcode-mcp "$subcommand" --help >/tmp/gitcode-mcp-help-"$subcommand".txt
                grep -qiE 'usage|help|gitcode-mcp|'"$subcommand" /tmp/gitcode-mcp-help-"$subcommand".txt
              done

              if grep -RIn 'fixture client is read-only' cmd internal --exclude='*_test.go'; then
                echo "explicit live write path still exposes fixture-only read-only behavior" >&2
                exit 65
              fi

              if grep -RInE '(Authorization:|Bearer[[:space:]]+[A-Za-z0-9._-]{16,}|Cookie:|Set-Cookie:|sk-[A-Za-z0-9_-]{16,}|GITCODE_TOKEN[[:space:]]*=)' . \
                --exclude-dir=.git \
                --exclude-dir=.cache \
                --exclude-dir=ai \
                --exclude-dir=docs/triborg \
                --exclude='*.zip'; then
                echo "repository contains secret-like or unsanitized fixture material" >&2
                exit 66
              fi
          expected_exit_codes: [0]
          policy:
            validation_scope: final_offline_gates
