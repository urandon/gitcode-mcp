apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-design-implementator-run-plan
  title: GitCode MCP cache-first design implementation run
spec:
  workflow: triborg-design-implementator-v2-ywd
  workflow_id_prefix: gitcode-mcp-design-implementator
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_cache_first_implementation
      input:
        design_package_zip_path: "@ai/design-package.zip"
        target_repo_path: "@repo"
        target_branch: feat/ai/gitcode-mcp-cache-first-implementation
        max_task_iterations: 30
        live_validation_enabled: false
        device_validation_enabled: false
        runner_runtime: worker
        implementation_constraints: |
          - Treat `ai/design-package.zip` as the primary design package and implementation task source.
          - Keep this repository standalone and public-safe: do not commit private repository names, internal URLs, credentials, cookies, bearer tokens, or unsanitized API responses.
          - Preserve cache-first/offline-first behavior. Routine reads, tests, fixtures, exports, and MCP read tools must work without live GitCode network access.
          - Include both stdio and HTTP/SSE MCP transports in the implementation direction. The operator explicitly wants HTTP/SSE as a base scenario for cases where the MCP server and agent run on different hosts.
          - Keep live GitCode writes explicit, idempotent, logged, and fixture-backed by default. Do not require real credentials for the default validation path.
          - Prefer cohesive Go package boundaries under `internal/` over broad CLI-only code. CLI and MCP surfaces should share internal services.
          - Keep generated durable design docs under `docs/design/` and implementation handoffs under `project/handoffs/` if a handoff is needed.
          - If the implementation needs to raise the Go version, make that an explicit, documented source change and keep local validation runnable with the selected toolchain.
        validation_constraints: |
          - Default validation must be offline and deterministic.
          - Network/API integration tests must skip cleanly unless explicit GitCode credentials are present.
          - Sanitized fixtures must not contain Authorization headers, bearer tokens, cookies, internal hostnames, or private project names.
          - The final repository state must not leave the original scaffold-only `not implemented yet` command behavior as the main product surface.
        final_validation_command:
          script:
            text: |
              #!/usr/bin/env bash
              set -euo pipefail

              export GOCACHE="${GOCACHE:-$PWD/.cache/go-build}"
              mkdir -p "$GOCACHE"

              test -s go.mod
              test -s cmd/gitcode-mcp/main.go
              test -s docs/design/architecture.md
              test -s docs/design/tasks.json
              test -s docs/design/outcome-contract.json

              ./scripts/check.sh

              go run ./cmd/gitcode-mcp --help >/tmp/gitcode-mcp-help.txt
              go run ./cmd/gitcode-mcp --version >/tmp/gitcode-mcp-version.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-help.txt
              grep -q "gitcode-mcp" /tmp/gitcode-mcp-version.txt

              grep -Eq 'ingest|index|search|get|snippet|backlinks|tasks|tracks|link-check|stale-index|recent|sync-status|export|diff|mcp|sync' /tmp/gitcode-mcp-help.txt

              if grep -RIn 'not implemented yet' cmd internal; then
                echo "CLI still exposes scaffold-only command behavior" >&2
                exit 65
              fi

              if grep -RInE '(Authorization:|Bearer[[:space:]]+[A-Za-z0-9._-]{16,}|Cookie:|Set-Cookie:|sk-[A-Za-z0-9_-]{16,}|GITCODE_TOKEN[[:space:]]*=)' . \
                --exclude-dir=.git \
                --exclude-dir=.cache \
                --exclude-dir=ai \
                --exclude='*.zip'; then
                echo "repository contains secret-like or unsanitized fixture material" >&2
                exit 66
              fi
          expected_exit_codes: [0]
          policy:
            validation_scope: final_offline_gates
