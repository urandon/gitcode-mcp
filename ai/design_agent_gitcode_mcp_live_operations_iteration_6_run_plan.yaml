apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-live-operations-iteration-6-design-run-plan
  title: GitCode MCP live operations iteration 6 design run
spec:
  workflow: triborg-design-agent-ywd
  workflow_id_prefix: gitcode-mcp-live-operations-design-agent
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_live_operations_iteration_6
      input:
        task_markdown: |
          Design the sixth implementation iteration for `gitcode-mcp`.

          Use `project/tasks/TASK-0007-live-operations-iteration-6.md` as the scoped repo-local task brief. This run plan adds design-agent context and output requirements; it does not supersede the task.

          This iteration starts after iteration 5 was implemented and live-smoked. Do not edit or reinterpret `ai/design_implementator_gitcode_mcp_live_api_iteration_5_run_plan.yaml`; it is a historical run input. The new design package must be the iteration 6 package and must be driven by the iteration 5 smoke report plus TASK-0007.

          Primary evidence to read:
          - `project/tasks/TASK-0007-live-operations-iteration-6.md`
          - `project/handoffs/2026-06-24-live-api-iteration-5-smoke.md`
          - `project/tasks/TASK-0006-live-api-coverage-iteration-5.md`
          - `project/research/gitcode-wiki-api-v5-repository-model-2026-06-23.md`
          - `docs/cache-and-sync-model.md`
          - `docs/repo-binding.md`
          - `docs/secrets.md`
          - `docs/operations/mcp-installation-and-secrets.md`

          Current findings to design around:
          - MCP has useful cache read tools, but lacks lifecycle/control-plane tools for repo binding/status, live sync, index refresh, auth status, doctor/readiness, migration/cache setup diagnostics, and cache path errors.
          - MCP startup can fail before `tools/list` when the cache path is unwritable, schema-incompatible, or locked. The product needs explicit readiness diagnostics instead of silently losing all GitCode tools.
          - Large collection sync needs bounded traversal, command cancellation, progress or partial state, and retryable diagnostics across all collection types.
          - Empty wiki bootstrap is unresolved. The v5 wiki-as-repository path works after a wiki exists, but first-page creation failed until a human created a page in the GitCode UI.
          - Initialized wiki sync currently normalizes `Home.md` as `wiki/Home.md.md`.
          - Wiki `create-page` after manual bootstrap reaches the provider but fails write-confirmation decoding because the response lacks the expected path/sha shape.
          - Issue writes can fail because empty labels are serialized as `labels: []` when no label mutation was requested.
          - `add-comment --live` has response decoding and credential parity gaps. `auth status` can see Keychain while `add-comment` reports missing credentials; direct `/api/v5` curl with the same token succeeds.
          - PR list/detail/comment routes have live evidence through `/api/v5/repos/{owner}/{repo}/pulls` and should receive concrete design treatment.
          - Parallel read/MCP-style access can hit writer-lock contention and surface as `internal_error`.

          Required design outcomes:
          1. MCP lifecycle/control-plane tool decision and schemas.
          2. MCP startup/readiness diagnostic design.
          3. Bounded collection sync design with cancellation/progress/partial-state semantics.
          4. Empty wiki bootstrap or typed unsupported-state design.
          5. Initialized wiki path normalization and write-confirmation design.
          6. Credential resolver parity design for auth/read/write commands.
          7. Issue label omission and comment response decoding design.
          8. PR read/comment route schema and cache design.
          9. Cache lock/concurrency diagnostic design for agent-side parallel calls.

          Public-safety constraints:
          - Do not commit private repository coordinates, personal filesystem paths, raw credentials, cookies, bearer tokens, raw Authorization headers, SSH key material, or unsanitized API/browser responses.
          - Use sanitized placeholders and sanitized live-shaped fixtures only.
          - Browser-session cookies and browser-derived access/refresh tokens remain out of scope.
          - Do not move, rename, rewrite, or unpack prior zip artifacts.
          - Do not edit historical iteration 5 run plans or historical design package directories.

          Required output shape:
          - Brief executive summary.
          - Evidence summary from the iteration 5 smoke.
          - Route/schema matrix updates for MCP lifecycle, wiki, issues, comments, and PRs.
          - Component impact list.
          - MCP lifecycle/readiness design.
          - Collection sync/progress/timeout design.
          - Wiki empty/bootstrap and initialized-write design.
          - Credential parity and write confirmation design.
          - PR/comment design.
          - Cache lock/concurrency design.
          - Ordered implementation tasks with concise acceptance criteria.
          - Offline validation plan.
          - Optional live smoke plan.
          - Explicit non-goals.

          Acceptance target for the implementator:
          - `go test ./...` passes without real credentials, network, SSH agent, browser cookies, or OS Keychain access.
          - New mocked MCP tests prove lifecycle bootstrap/readiness behavior.
          - New mocked sync tests prove bounded collection traversal and cancellation behavior.
          - New mocked wiki tests cover empty/uninitialized wiki behavior, `.md` path normalization, and write confirmation decoding.
          - New mocked credential tests fail if `auth status` can see a credential but a live write command cannot.
          - New mocked issue/comment/PR tests cover the live-shaped request/response contracts described in TASK-0007.
        require_clarification_stages: []
        design_agent:
          project:
            workspace_root: "@repo"
            runs_dir: "@artifacts"
            competitor_repo_cache_root: "@ai/research-repos"
            target_vm_repo: "@repo"
            target_vm_name: GitCode MCP live operations iteration 6
            managed_language_name: Go
            language_spec_files:
              - "@repo/README.md"
              - "@repo/AGENTS.md"
              - "@repo/project/tasks/backlog.md"
              - "@repo/project/tasks/TASK-0007-live-operations-iteration-6.md"
              - "@repo/project/tasks/TASK-0006-live-api-coverage-iteration-5.md"
              - "@repo/project/handoffs/2026-06-24-live-api-iteration-5-smoke.md"
              - "@repo/project/research/gitcode-wiki-api-v5-repository-model-2026-06-23.md"
              - "@repo/docs/architecture.md"
              - "@repo/docs/cache-and-sync-model.md"
              - "@repo/docs/repo-binding.md"
              - "@repo/docs/secrets.md"
              - "@repo/docs/operations/mcp-installation-and-secrets.md"
          competitors:
            - id: gh-cli
              name: GitHub CLI
              source_url: https://github.com/cli/cli
              language: Go
              runtime: Reference for Go CLI API ergonomics, auth behavior, PR/comment modeling, and error reporting.
            - id: mcp-spec
              name: Model Context Protocol specification
              source_url: https://github.com/modelcontextprotocol/modelcontextprotocol
              language: TypeScript
              runtime: Reference for MCP tool discovery, tool result errors, and server capability/readiness modeling.
          components: []
          search:
            provider: exa
            max_queries: 8
            max_results: 32
            max_sources: 48
            gap_fill_enabled: true
            fallback_queries:
              - query: MCP tools readiness diagnostics startup failure cache locked
                intent: Find MCP guidance for tool discovery, startup failures, and tool-result diagnostics.
                priority: high
              - query: GitCode api v5 pull requests comments labels wiki contents
                intent: Cross-check documented or community evidence for PR/comment/wiki API shapes.
                priority: high
              - query: GitCode wiki first page create api v5 contents
                intent: Find evidence for initializing an empty GitCode wiki without browser cookies.
                priority: high
          runtime:
            max_auto_top_level_architecture_review_iterations: 2
            max_auto_component_review_iterations: 6
            enable_clarifications: true
            allow_network_for_research: true
            allow_network_for_plan: true
            allow_network_for_component_design: true
            fail_fast: false
            top_level_architecture_approval_mode: auto
            top_level_retry_exhausted_policy: human_review
          output:
            write_design_package: true
            design_package_path: "@artifacts/gitcode_mcp_live_operations_iteration_6_design_package.zip"
            report_path: "@artifacts/gitcode_mcp_live_operations_iteration_6_report.md"
            public_safe: true
