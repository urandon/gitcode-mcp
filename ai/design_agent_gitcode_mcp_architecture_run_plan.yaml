apiVersion: triborg.dev/v0alpha1
kind: WorkflowRunPlan
metadata:
  id: gitcode-mcp-architecture-design-agent-run-plan
  title: GitCode MCP cache-first architecture design run
spec:
  workflow: triborg-design-agent-ywd
  workflow_id_prefix: gitcode-mcp-design-agent
  runtime:
    path_aliases:
      repo: "@plan_dir/.."
      ai: "@repo/ai"
      artifacts: "@ai/artifacts"
    artifacts_root: "@artifacts"
  cases:
    - run_label: gitcode_mcp_cache_first_architecture
      input:
        task_markdown: |
          Design the architecture for `gitcode-mcp`, a standalone public Go tool for cache-first work with GitCode tracker/wiki through CLI and MCP under poor network availability.

          Context:
          - Repository path is provided by `design_agent.project.workspace_root` in this run plan.
          - The repository is intentionally standalone and public-safe. Public architecture outputs must not depend on or mention private project/control repositories by name.
          - For this local dogfood run only, use the existing plaintext knowledge/control repository as a behavioral exemplar of the layer that `gitcode-mcp` should eventually replace for agent sessions. Abstract any private names into generic concepts in the product architecture.
          - The current code is an initial Go scaffold with `cmd/gitcode-mcp`, `internal/cli`, docs, and lightweight project-management folders.
          - The target product must help agents and humans continue reading/searching/inspecting GitCode tracker/wiki data when GitCode is slow, flaky, or unavailable.
          - The first useful product slice should be read-first: source ingest, local cache, search/get/backlinks/resolve/sync-status, deterministic export/diff, then MCP read tools.
          - Writes to GitCode should be explicit, idempotent, logged, and optional; routine reads must not require live GitCode access.
          - The end-state should replace the current ad-hoc agent knowledge layer where an agent walks a plaintext repo, uses `find`, `rg --files`, `rg -n`, `sed`, and hand-maintained markdown indexes to orient itself.
          - RAG is useful for coordinator work, but it is not the first implementation slice. The first slice must be RAG-ready by preserving source identity, chunks, offsets, metadata, backlinks, and citation anchors so semantic retrieval can be added later without a cache migration.
          - Source-analysis expectations:
            - Treat GitCode official docs as primary web/API evidence, especially `https://docs.gitcode.com/docs/apis/` for `/api/v5`, auth, status codes, rate limits, issues, repositories, search, and pull requests.
            - Treat cloneable reference repositories under `competitors[].source_url` as source-code evidence that the flow may clone into the run artifacts automatically.
            - Do not require the operator to pre-clone competitor repositories for the default run; pre-cloning is only an optimization if network or GitHub availability is poor.
            - If GitCode public docs do not expose enough wiki/tracker behavior, call that out as an API-discovery gap and propose fixture/reverse-engineering steps separately from the public product architecture.

          Architecture goals:
          1. Propose a Go package/module layout that can grow from the current scaffold without overengineering.
          2. Define the cache model: records, identity map, source aliases, local paths, remote GitCode issue/wiki ids, backlinks, full-text/search index, sync status, conflicts, and deterministic export snapshots.
          3. Define the GitCode adapter boundary for tracker/wiki API discovery, auth, pagination, comments, attachments, wiki pages, issue CRUD, rate limits, and failure modes under bad network conditions.
          4. Define the MCP server boundary and read-first tool surface, including at least: `search_tasks`, `get_task`, `get_page`, `backlinks`, `resolve_id`, `sync_status`, `export_snapshot`, and `diff_snapshot`.
          5. Define CLI commands and how they map to the same internal services as MCP: `sync`, `search`, `get`, `link-check`, `export`, `diff`, and diagnostics.
          6. Define cache freshness and sync semantics for offline-first operation: stale reads, explicit refresh, conflict records, idempotency keys, retry policy, local lock files, and audit logs.
          7. Define public-safe fixture strategy: sanitized GitCode responses, no credentials, no internal URLs, no non-public source names.
          8. Define testing strategy: unit tests for cache/index/link resolution, golden exports, adapter contract tests over fixtures, MCP tool tests, and integration tests gated behind explicit credentials.
          9. Produce a one-week implementation plan with milestones that gives us a useful first version without broad migration work.
          10. Define the RAG readiness boundary: what must be stored and exposed now for future semantic retrieval, and what should remain a later optional extension.

          Knowledge-layer replacement requirements:
          - Model the current agent read path explicitly: start from repo map, read agent guide, read live coordinator/status surfaces, inspect backlog, inspect track/source indexes, then open task/source/handoff files by stable id.
          - Support fast filesystem-like discovery without live network:
            - list files by kind/path/date/status, equivalent to `find ... -name '*.md'`;
            - search full text by literal/regex terms, equivalent to `rg -n`;
            - search file names and ids, equivalent to `rg --files` plus task-id lookup;
            - retrieve bounded snippets with surrounding context, equivalent to `sed -n`;
            - expose frontmatter and markdown heading outline for each source.
          - Support current high-value query patterns:
            - find task by stable id such as `TASK-0202` without reconstructing path from title;
            - find all sources related to a task, track, source kind, workflow, repo, branch, or handoff;
            - list active/ready/candidate/done tasks with related ids and outcome text;
            - answer "what should I read first for this topic?";
            - answer "what changed recently?";
            - answer "what is accepted, branch-only, stale, superseded, or needs review?";
            - answer "which docs link to this source and which links are broken?";
            - find stale mentions after rename/id migration;
            - provide exact citation anchors back to source path and line/snippet.
          - Preserve and generate the derived indexes that currently make plaintext usable:
            - top-level repo orientation map;
            - AI/session read map;
            - source ledger;
            - source discovery by kind/topic/workflow/track;
            - track index;
            - task backlog;
            - acceptance ledger;
            - open questions and decision index;
            - backlink graph and broken-link report.
          - Treat GitCode issue/wiki ids as aliases. Stable source ids and legacy task ids remain durable lookup keys even after tracker import.
          - Define a cache schema that can represent both raw sources and derived projections, with provenance from derived index rows back to raw documents.
          - Define incremental indexing: content hash, frontmatter parse, heading parse, outbound links, backlinks, id aliases, status extraction, changed-file routing, and stale-index detection.
          - Define agent-facing MCP tools that replace the current shell-only workflow:
            - `search_sources(query, filters, limit)`;
            - `list_sources(filters, sort)`;
            - `get_source(id_or_path, include_outline, include_frontmatter)`;
            - `get_snippet(id_or_path, line_or_pattern, before, after)`;
            - `resolve_id(id_or_alias)`;
            - `list_tasks(filters)`;
            - `get_task(task_id)`;
            - `list_tracks(filters)`;
            - `source_backlinks(id_or_path)`;
            - `link_check(scope)`;
            - `recent_changes(since)`;
            - `stale_index_report()`;
            - `sync_status()`.
          - Define CLI equivalents for the same services so agents are not forced through MCP:
            - `gitcode-mcp ingest`;
            - `gitcode-mcp index`;
            - `gitcode-mcp search`;
            - `gitcode-mcp get`;
            - `gitcode-mcp snippet`;
            - `gitcode-mcp backlinks`;
            - `gitcode-mcp tasks`;
            - `gitcode-mcp tracks`;
            - `gitcode-mcp link-check`;
            - `gitcode-mcp stale-index`;
            - `gitcode-mcp recent`;
            - `gitcode-mcp sync-status`.
          - Make grep-compatible output a first-class ergonomic requirement: compact path:line:snippet output for humans/agents, plus JSON output for structured MCP/UI use.
          - Include migration semantics for replacing clickable local markdown links with GitCode issue/wiki links while preserving local cache links and bidirectional alias maps.
          - Include a "minimum replacement bar": an agent should be able to perform a coordinator intake, task lookup, handoff review, stale pointer search, and source citation using only `gitcode-mcp` cache/MCP reads when the network is offline.

          RAG-ready substrate requirements:
          - Treat RAG as a later query consumer over the local cache, not as the first product slice or the source of truth.
          - Build a hybrid retrieval foundation now: exact ID lookup, metadata filters, BM25/literal search, backlinks, and snippets must work before embeddings.
          - Store raw documents separately from derived projections and future embedding records.
          - Define a stable chunk model:
            - chunk id;
            - source id;
            - source revision/content hash;
            - byte offsets;
            - line start/end;
            - heading path;
            - text;
            - normalized text;
            - metadata inherited from the source;
            - outbound links and resolved aliases.
          - Preserve citation fidelity for every chunk: future semantic answers must cite source id/path/wiki URL plus line/snippet, not only vector ids.
          - Keep chunking deterministic and re-runnable from raw cache records; embeddings, if added later, are disposable derived artifacts.
          - Add a corpus export boundary so external RAG/indexing tools can consume the cache without depending on GitCode network access.
          - Define enough metadata to support coordinator retrieval:
            - kind, status, track, topic, task id, source id, GitCode issue id, wiki page id, repo, branch, workflow id, run id, author/owner, created/updated timestamps, accepted/stale/superseded/review labels.
          - Defer these until after the read-first cache/search slice:
            - embedding provider integration;
            - vector database selection;
            - reranking;
            - semantic answer generation;
            - chat memory over tracker/wiki;
            - model-specific retrieval tuning.
          - State explicitly how a later RAG layer would compose with existing tools: semantic search proposes candidate chunks, but `resolve_id`, `get_source`, `get_snippet`, backlinks, and sync status remain authoritative for citation and freshness.

          Required output shape:
          - Executive architecture summary.
          - Component diagram in Mermaid.
          - Data model proposal.
          - Agent knowledge-layer replacement contract, including shell-equivalent query mapping.
          - CLI command contract table.
          - MCP tool contract table.
          - Derived index/build pipeline design.
          - RAG readiness boundary: required source/chunk/provenance model now, deferred vector/embedding work later.
          - Cache/sync state machine.
          - Failure-mode table for poor network availability.
          - Security/public-safety notes.
          - One-week implementation plan.
          - Open questions and explicit non-goals.
          - Separate section: Triborg/Runa dogfood observations from this run.
        require_clarification_stages: []
        design_agent:
          project:
            workspace_root: "@repo"
            runs_dir: "@artifacts"
            competitor_repo_cache_root: "@ai/research-repos"
            target_vm_repo: "@repo"
            target_vm_name: GitCode MCP cache-first tooling
            managed_language_name: Go
            language_spec_files:
              - "@repo/README.md"
              - "@repo/AGENTS.md"
              - "@repo/docs/architecture.md"
              - "@repo/docs/cache-and-sync-model.md"
              - "@repo/docs/gitcode-api-discovery.md"
          competitors:
            - id: mcp
              name: Model Context Protocol
              source_url: https://github.com/modelcontextprotocol/modelcontextprotocol
              language: Protocol/tooling
              runtime: >-
                Agent-facing read/write tool protocol. Reference docs surface:
                https://modelcontextprotocol.io.
            - id: gh-cli
              name: GitHub CLI
              source_url: https://github.com/cli/cli
              language: Go
              runtime: >-
                Reference for command ergonomics, config, auth, and API adapter
                layering. Reference repo/docs surface:
                https://github.com/cli/cli.
            - id: gitlab-cli
              name: GitLab CLI
              source_url: https://gitlab.com/gitlab-org/cli.git
              language: Go
              runtime: >-
                Reference for GitLab tracker/API CLI ergonomics, auth, config,
                pagination, and issue/merge-request command structure.
          components:
            - id: source-ingest
              name: Source Ingest
              prompt: Normalize markdown, tracker export, and wiki export inputs into cache records while preserving stable source ids and provenance.
            - id: cache-store
              name: Local Cache Store
              prompt: Design the on-disk cache, identity map, search index, backlinks, sync status, conflict records, and deterministic snapshot exports.
            - id: knowledge-indexer
              name: Knowledge Indexer
              prompt: >-
                Design the parser/index builder that replaces ad-hoc filesystem
                walking and grep: frontmatter, headings, ids, statuses, links,
                backlinks, snippets, derived rows, stale-index detection, and
                citation anchors.
            - id: rag-ready-corpus
              name: RAG-Ready Corpus Boundary
              prompt: >-
                Define the source/chunk/provenance/export model that makes the
                cache usable by a later semantic retrieval or RAG layer without
                putting embeddings, vector storage, reranking, or generated
                answers into the first implementation slice.
            - id: agent-query-surface
              name: Agent Query Surface
              prompt: >-
                Define the CLI/MCP query surface that lets an agent do task
                lookup, source discovery, stale-pointer search, handoff review,
                recent-change inspection, link checking, and citation retrieval
                without raw shell access or live network.
            - id: gitcode-adapter
              name: GitCode Adapter
              prompt: Isolate GitCode tracker/wiki API access, auth, pagination, rate limits, attachments, comments, wiki pages, and bad-network behavior.
            - id: cli-surface
              name: CLI Surface
              prompt: Define cache-first commands for sync, search, get, link-check, export, diff, diagnostics, and safe write gates.
            - id: mcp-server
              name: MCP Server
              prompt: Define read-first MCP tools over the local cache and the later explicit write tools that reuse CLI/internal services.
            - id: sync-engine
              name: Sync Engine
              prompt: Define freshness, retry, idempotency, write logs, conflict handling, locks, and offline-first reconciliation.
            - id: fixtures-tests
              name: Fixtures And Tests
              prompt: Define sanitized fixture strategy, unit/golden tests, adapter contract tests, MCP tests, and credential-gated integration tests.
            - id: operations-security
              name: Operations And Security
              prompt: Define config, credential handling, redaction, audit logs, telemetry, error diagnostics, and public-safe repository practices.
          search:
            provider: exa
            max_queries: 20
            max_results: 50
            max_sources: 100
            gap_fill_enabled: false
            fallback_queries:
              - query: GitCode OpenAPI /api/v5 issues repositories search authentication rate limits docs.gitcode.com
                intent: Find primary GitCode API evidence for tracker/wiki/cache adapter design.
                priority: high
              - query: GitCode API issues wiki repositories pull requests pagination status codes docs.gitcode.com
                intent: Find GitCode endpoint and failure-mode evidence relevant to cache/sync.
                priority: high
              - query: Model Context Protocol resources tools prompts JSON-RPC official specification repository
                intent: Find MCP protocol/tool-contract evidence for read-first MCP server design.
                priority: high
              - query: modelcontextprotocol modelcontextprotocol repository schema docs resources tools prompts
                intent: Find source-level MCP schema and documentation structure evidence.
                priority: medium
              - query: GitHub CLI cli/cli source code auth config API client cache command architecture
                intent: Find Go CLI architecture evidence for auth/config/API boundaries.
                priority: high
              - query: GitHub CLI issue API search pagination GraphQL REST source code cli/cli
                intent: Find source-level examples for tracker-like API ergonomics and pagination.
                priority: medium
              - query: GitLab CLI gitlab-org/cli issues merge requests API client auth config source code Go
                intent: Find Go CLI source evidence for GitLab-like tracker API ergonomics.
                priority: medium
              - query: cache-first CLI offline sync local index MCP server Go architecture
                intent: Find adjacent implementation patterns for local cache/search/sync tooling.
                priority: medium
              - query: RAG retrieval chunk provenance citation anchors local document cache BM25 vector hybrid search architecture
                intent: Find design evidence for making a local document cache RAG-ready while preserving exact citations.
                priority: medium
          runtime:
            max_parallel_research: 3
            max_parallel_component_design: 4
            fail_fast: false
            enable_clarifications: true
            top_level_architecture_approval_mode: auto
            top_level_retry_exhausted_policy: human_review
            max_auto_top_level_architecture_review_iterations: 3
            max_auto_component_review_iterations: 3
            allow_network_for_research: true
            allow_network_for_plan: true
            allow_network_for_component_design: true
